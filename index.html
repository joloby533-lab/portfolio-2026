    <script>
      (() => {
        const DESIGN_WIDTH = 1728;
        const DESIGN_HEIGHT = 959;
        const MIN_STAGE_SCALE = 0.66;
        const FISH_SWIM_STATE_KEY = "hao-portfolio-fish-swim-state";
        const fitScale = Math.min(window.innerWidth / DESIGN_WIDTH, window.innerHeight / DESIGN_HEIGHT);
        const scale = Math.max(MIN_STAGE_SCALE, fitScale);
        const stageWidth = DESIGN_WIDTH * scale;
        const pageWidth = Math.max(window.innerWidth, stageWidth);
        const left = (pageWidth - stageWidth) / 2;
        const top = (window.innerHeight - DESIGN_HEIGHT * scale) / 2;

        document.documentElement.style.setProperty("--home-page-width", `${pageWidth}px`);
        document.documentElement.style.setProperty("--home-stage-scale", String(scale));
        document.documentElement.style.setProperty("--home-stage-left", `${left}px`);
        document.documentElement.style.setProperty("--home-stage-top", `${top}px`);

        try {
          const fishState = JSON.parse(sessionStorage.getItem(FISH_SWIM_STATE_KEY) || "{}");
          Object.entries(fishState).forEach(([fishId, progress]) => {
            const seconds = Number(progress);
            const number = fishId.replace("fish-", "").padStart(2, "0");

            if (Number.isFinite(seconds)) {
              document.documentElement.style.setProperty(`--fish-${number}-swim-delay`, `${-seconds}s`);
            }
          });
        } catch {}
      })();
    </script>
